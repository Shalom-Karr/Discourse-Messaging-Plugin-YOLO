name: Plugin Tests

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  rspec:
    name: RSpec
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: discourse
          POSTGRES_PASSWORD: discourse
          POSTGRES_DB: discourse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:6
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: discourse
      PGPASSWORD: discourse
      DISCOURSE_DEV_DB: discourse_test

    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libpq-dev \
            libssl-dev \
            libreadline-dev \
            imagemagick \
            optipng \
            advancecomp \
            gifsicle \
            jpegoptim \
            pngcrush \
            pngquant \
            jhead

      - name: Checkout Discourse
        uses: actions/checkout@v4
        with:
          repository: discourse/discourse
          path: discourse

      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: discourse/plugins/discourse-admin-messenger

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          working-directory: discourse
          bundler-cache: false

      - name: Bundle install
        working-directory: discourse
        run: |
          gem install bundler --no-document
          bundle install --jobs 4 --retry 3

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up database
        working-directory: discourse
        run: |
          bundle exec rake db:create
          bundle exec rake db:migrate

      - name: Run plugin specs
        working-directory: discourse
        run: |
          bundle exec rspec plugins/discourse-admin-messenger/spec \
            --format documentation

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rspec-results
          path: discourse/tmp/rspec*.xml

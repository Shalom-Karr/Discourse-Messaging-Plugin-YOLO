name: Plugin Tests

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  rspec:
    name: RSpec
    runs-on: ubuntu-latest
    container:
      image: discourse/discourse_dev:release
      options: --user root

    env:
      RAILS_ENV: test
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: discourse
      PGPASSWORD: discourse
      DISCOURSE_DEV_DB: discourse_test
      LOAD_PLUGINS: 1

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: discourse
          POSTGRES_PASSWORD: discourse
          POSTGRES_DB: discourse_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:6
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Discourse
        uses: actions/checkout@v4
        with:
          repository: discourse/discourse
          path: discourse

      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: discourse/plugins/discourse-admin-messenger

      - name: Bundle install
        working-directory: discourse
        run: bundle install --jobs 4 --retry 3

      - name: Set up database
        working-directory: discourse
        env:
          REDIS_URL: redis://redis:6379
        run: |
          bundle exec rake db:create db:migrate

      - name: Run plugin specs
        working-directory: discourse
        env:
          REDIS_URL: redis://redis:6379
        run: |
          bundle exec rspec plugins/discourse-admin-messenger/spec \
            --format documentation
